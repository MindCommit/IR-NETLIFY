name: IR-NETLIFY Unified Monitor

on:
  repository_dispatch:
    types: [domain_failover]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Core Logic
        run: |
          # ابتدا دامنه خراب را تعویض میکنیم
          python monitor.py 
          # سپس لینک‌های ساب را با دامنه جدید میسازیم
          python generator.py

      - name: Save Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add domain.txt active_domains.txt failed_domains.txt IR_NETLIFY_SUB.txt
          git commit -m "Auto-Fix: New healthy domain set & Sub updated"
          git push
