name: IR-NETLIFY Unified Monitor

on:
  repository_dispatch:
    types: [domain_failover]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Run Monitor and Generator
        run: |
          python monitor.py 
          python generator.py

      - name: Save Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git commit -m "Auto-Fix: Domain replaced and configs regenerated" || exit 0
          git push
