name: IR-NETLIFY Unified Monitor

on:
  repository_dispatch:
    types: [domain_failover]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Core Logic
        run: |
          python monitor.py 
          python generator.py

      - name: Save Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add domain.txt domain_new.txt active_domains.txt active_domains_new.txt failed_domains.txt failed_domains_new.txt IR_NETLIFY_SUB.txt IR_NETLIFY_SUB_new.txt
          git commit -m "Auto-Fix: Domains updated and Subscriptions regenerated"
          git push
