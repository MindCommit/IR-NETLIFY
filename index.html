			:root {
				--theme-netlify: #00e1ff;
				--neon-red: #ff0000;
				--neon-orange: #ff9100;
				--neon-green: #00c40d;
				--dark-bg: #0a0b10;
				--card-bg: #161b22;
				--text-color: #e6edf3;
				--scroll-thumb: #30363d;
				--current-theme: var(--theme-netlify);
			}

			::-webkit-scrollbar {
				width: 8px;
			}

			::-webkit-scrollbar-track {
				background: var(--dark-bg);
			}

			::-webkit-scrollbar-thumb {
				background: var(--scroll-thumb);
				border-radius: 10px;
				border: 2px solid var(--dark-bg);
			}

			::-webkit-scrollbar-thumb:hover {
				background: var(--current-theme);
			}

			body {
				font-family: 'CustomFont', sans-serif;
				background-color: var(--dark-bg);
				color: var(--text-color);
				display: flex;
				justify-content: center;
				align-items: center;
				min-height: 100vh;
				margin: 0;
				flex-direction: column;
				padding: 20px;
				box-sizing: border-box;
				filter: brightness(1) contrast(1.15);
			}

			body::before {
				content: "";
				position: absolute;
				width: 400px;
				height: 400px;
				background: var(--current-theme);
				filter: blur(180px);
				opacity: 0.05;
				z-index: -1;
				top: 5%;
				right: 5%;
				transition: background 0.4s ease;
			}

			.container {
				background-color: var(--card-bg);
				padding: 30px;
				border-radius: 20px;
				border: 1px solid #30363d;
				box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
				width: 90%;
				max-width: 420px;
				position: relative;
				box-sizing: border-box;
			}

			h2 {
				color: var(--current-theme);
				text-align: center;
				text-transform: uppercase;
				margin-bottom: 20px;
				font-size: 1.1rem;
				transition: color 0.4s ease;
			}

			.tabs,
			#netlify-options,
			#netlify-config-type {
				display: flex;
				flex-direction: row-reverse;
				gap: 10px;
				margin-bottom: 20px;
				padding-bottom: 15px;
			}

			.tabs {
				border-bottom: 1px solid #30363d;
			}

			#netlify-options,
			#netlify-config-type {
				display: none;
				flex-direction: row-reverse;
				gap: 10px;
				margin-bottom: 5px;
				animation: fadeIn 0.3s ease;
			}

			#custom-settings {
				display: none;
				border: 1px dashed var(--neon-orange);
				padding: 15px;
				border-radius: 12px;
				margin-bottom: 15px;
				background: rgba(255, 145, 0, 0.02);
			}

			@keyframes fadeIn {
				from {
					opacity: 0;
					transform: translateY(-5px);
				}

				to {
					opacity: 1;
					transform: translateY(0);
				}
			}

			.tab-btn,
			.sub-tab-btn {
				position: relative;
				flex: 1;
				padding: 10px;
				background: rgba(255, 255, 255, 0.03);
				border: 1px solid #30363d;
				color: #8b949e;
				border-radius: 8px;
				cursor: pointer;
				font-weight: bold;
				transition: all 0.3s;
				text-transform: uppercase;
				font-size: 0.7rem;
			}

			.tab-btn:hover,
			.sub-tab-btn:hover {
				background: rgba(255, 255, 255, 0.05);
				color: var(--text-color);
			}

			#tab-netlify.active {
				border-color: var(--theme-netlify);
				color: var(--theme-netlify);
				background: rgba(0, 207, 255, 0.15);
				box-shadow: 0 0 10px rgba(0, 207, 255, 0.5);
			}

			#btn-shecan.active {
				border-color: var(--theme-netlify);
				color: var(--theme-netlify);
				background: rgba(0, 207, 255, 0.15);
				box-shadow: 0 0 7px rgba(0, 207, 255, 0.3);
			}

			#btn-normal.active {
				border-color: var(--theme-netlify);
				color: var(--theme-netlify);
				background: rgba(0, 207, 255, 0.15);
				box-shadow: 0 0 7px rgba(0, 207, 255, 0.3);
			}

			#btn-custom.active {
				border-color: var(--neon-orange);
				color: var(--neon-orange);
				background: rgba(255, 170, 0, 0.13);
				box-shadow: 0 0 7px rgba(225, 117, 0, 0.3);
			}

			#btn-default.active {
				border-color: var(--theme-netlify);
				color: var(--theme-netlify);
				background: rgba(0, 207, 255, 0.10);
				box-shadow: 0 0 7px rgba(0, 207, 255, 0.3);
			}

			.input-group {
				margin-bottom: 15px;
			}

			label {
				font-size: 0.7rem;
				color: var(--current-theme);
				font-weight: bold;
				text-transform: uppercase;
				display: block;
				margin-bottom: 8px;
				transition: color 0.4s ease;
			}

			.tutorial-link {
				color: var(--neon-green);
				text-decoration: none;
				font-size: 0.6rem;
				border: 2px solid rgba(0, 80, 40, 0.9);
				padding: 2px 8px;
				border-radius: 8px;
				transition: 0.3s;
				display: none;
			}

			.tutorial-link:hover {
				background: rgba(0, 255, 40, 0.1);
			}

			input[type="text"],
			textarea {
				width: 100%;
				padding: 12px;
				background: #0d1117;
				border: 1px solid #30363d;
				border-radius: 10px;
				color: white;
				box-sizing: border-box;
				font-family: 'Consolas', monospace;
				font-size: 0.8rem;
				transition: all 0.3s;
				resize: vertical;
			}

			input:focus,
			textarea:focus {
				outline: none;
				border-color: var(--current-theme);
				box-shadow: 0 0 8px rgba(255, 255, 255, 0.05);
			}

			.action-btn {
				background: transparent;
				padding: 4px 10px;
				border-radius: 6px;
				cursor: pointer;
				font-size: 0.65rem;
				font-weight: bold;
				text-transform: uppercase;
				transition: 0.3s;
			}

			.btn-default-action {
				color: var(--neon-orange);
				border: 1px solid var(--neon-orange);
			}

			.btn-clear {
				color: var(--neon-red);
				border: 1px solid var(--neon-red);
			}

			.btn-copy {
				color: #00c40d;
				border: 1px solid #00c40d;
			}

			.gen-btn {
				position: relative;
				background: transparent;
				color: var(--neon-green);
				border: 2px solid var(--neon-green);
				padding: 12px;
				border-radius: 12px;
				cursor: pointer;
				width: 100%;
				font-weight: bold;
				margin-top: 15px;
				text-transform: uppercase;
				transition: all 0.3s ease;
			}

			.gen-btn:hover {
				background-color: var(--neon-green);
				color: #000;
			}

			.gen-balanced-btn {
				position: relative;
				background: transparent;
				color: var(--neon-orange);
				border: 2px solid var(--neon-orange);
				padding: 12px;
				border-radius: 12px;
				cursor: pointer;
				width: 100%;
				font-weight: bold;
				margin-top: 10px;
				text-transform: uppercase;
				transition: all 0.3s ease;
			}

			.gen-balanced-btn:hover {
				background-color: var(--neon-orange);
				color: #000;
				box-shadow: 0 0 15px rgba(255, 145, 0, 0.4);
			}

			#output-container,
			#balanced-output {
				margin-top: 25px;
				display: none;
				animation: slideUp 0.3s ease-out;
			}

			.balanced-panel {
				background: rgba(0, 0, 0, 0.3);
				border: 1px solid #30363d;
				border-radius: 12px;
				padding: 15px;
			}

			.switch-container {
				display: flex;
				background: transparent;
				gap: 10px;
				margin-bottom: 15px;
			}

			.switch-btn {
				flex: 1;
				padding: 10px;
				background: rgba(255, 255, 255, 0.03);
				border: 1px solid #30363d;
				color: #8b949e;
				border-radius: 8px;
				cursor: pointer;
				font-weight: bold;
				transition: all 0.3s;
				text-transform: uppercase;
				font-size: 0.65rem;
			}

			.switch-btn.active {
				border-color: var(--neon-orange);
				color: var(--neon-orange);
				background: rgba(255, 145, 0, 0.13);
			}

			@keyframes slideUp {
				from {
					opacity: 0;
					transform: translateY(10px);
				}

				to {
					opacity: 1;
					transform: translateY(0);
				}
			}

			.success-header {
				display: flex;
				justify-content: space-between;
				align-items: center;
				margin-bottom: 10px;
			}

			#result-area {
				border-color: #00c40d;
				color: #00c40d;
				min-height: 150px;
			}

			.footer {
				margin-top: 25px;
			}

			.footer-link {
				color: var(--current-theme);
				text-decoration: none;
				font-size: 0.8rem;
				border: 2px solid var(--current-theme);
				padding: 7px 18px;
				border-radius: 50px;
				transition: 0.3s;
			}

			.footer-link:hover {
				color: var(--neon-green);
				border-color: var(--neon-green);
			}

			textarea::-webkit-resizer {
				background-color: var(--dark-bg);
				border: 1px solid var(--card-bg);
				outline: 1px solid var(--dark-bg);
				box-shadow: 0 0 2px var(--dark-bg);
			}

			.error-border {
				border: 3px solid var(--neon-red) !important;

		<script>
			let currentPlatform = 'netlify';
			let netlifyMode = 'shecan';

			let lastGeneratedJson = "";
			const sharedDefaults = ["helm.sh", "keda.sh", "rook.io", "istio.io", "cilium.io", "fluxcd.io", "harbor.io", "calico.org", "linkerd.io", "openebs.io", "tekton.dev", "longhorn.io", "blog.helm.sh", "docs.helm.sh", "crossplane.io", "kubernetes.io", "kubebuilder.io", "cert-manager.io", "letsencrypt.org", "kind.sigs.k8s.io", "kops.sigs.k8s.io", "krew.sigs.k8s.io", "kwok.sigs.k8s.io", "kueue.sigs.k8s.io", "jobset.sigs.k8s.io", "kaniko.sigs.k8s.io", "minikube.sigs.k8s.io", "operatorframework.io", "container.sigs.k8s.io", "kustomize.sigs.k8s.io", "argo-cd.readthedocs.io", "cluster-api.sigs.k8s.io", "descheduler.sigs.k8s.io", "gateway-api.sigs.k8s.io", "external-dns.sigs.k8s.io", "service-apis.sigs.k8s.io", "image-builder.sigs.k8s.io", "kubectl.docs.kubernetes.io", "metrics-server.sigs.k8s.io", "scheduler-plugins.sigs.k8s.io", "controller-runtime.sigs.k8s.io", "prometheus-operator.sigs.k8s.io", "node-feature-discovery.sigs.k8s.io", "hierarchical-namespaces.sigs.k8s.io", "secrets-store-csi-driver.sigs.k8s.io", "security-profiles-operator.sigs.k8s.io", "cluster-proportional-autoscaler.sigs.k8s.io"];
			const data = {
				netlify_normal: {
					label: "Netlify Domain",
					template: "vless://{USER}@{ADDRESS}:443?encryption=none&security=tls&sni={SNI}&alpn=h2%2Chttp%2F1.1&insecure=1&allowInsecure=1&type=xhttp&host={HOST}&path={PATH}&mode=auto#🌐%20@IR_NETLIFY%20%20%20{NAME}",
					defaults: sharedDefaults
				},
				netlify_shecan: {
					ips: ["50.7.5.83", "50.7.5.85", "50.7.87.2", "50.7.87.3", "50.7.87.4", "50.7.87.5", "144.76.1.88", "216.24.57.1", "37.16.18.81", "52.250.41.2", "76.76.21.21", "76.76.21.112", "85.10.207.48", "94.130.13.19", "94.130.33.41", "94.130.50.12", "95.216.69.37", "198.202.211.1", "198.252.206.1", "204.12.196.34", "216.150.1.193", "65.109.34.234", "94.130.70.160", "104.18.25.196", "138.201.54.122", "142.54.178.211", "149.154.167.99", "178.22.122.101", "204.79.197.220", "213.180.193.56", "216.239.38.120", "40.114.177.246", "63.141.252.203", "64.239.109.193"],
					defaults: sharedDefaults
				}

			function setPlatform() {
				document.getElementById('tutorial-link').style.display = 'inline-block';
				document.getElementById('netlify-options').style.display = 'flex';
				document.getElementById('netlify-config-type').style.display = 'flex';

			function setNetlifyMode(mode) {
				netlifyMode = mode;
				document.querySelectorAll('#netlify-options .sub-tab-btn').forEach(b => b.classList.remove('active'));
				document.getElementById(`btn-${mode}`).classList.add('active');
				document.getElementById('ip-group').style.display = (mode === 'shecan') ? 'block' : 'none';
				hideOutputs();
				loadDefaultDomains();
			}

			function setConfigMode(mode) {
				configMode = mode;
				document.querySelectorAll('#netlify-config-type .sub-tab-btn').forEach(b => b.classList.remove('active'));
				document.getElementById(`btn-${mode}`).classList.add('active');
				document.getElementById('custom-settings').style.display = (mode === 'custom') ? 'block' : 'none';
				hideOutputs();
			}

			function hideOutputs() {
				document.getElementById('output-container').style.display = 'none';
				document.getElementById('balanced-output').style.display = 'none';
			}

			function loadDefaultDomains() {
				const list = (netlifyMode === 'shecan' ? data.netlify_shecan.defaults : data.netlify_normal.defaults);
				document.getElementById('domain-list').value = list.join('\n');
			}

			function loadDefaultIps() {
				document.getElementById('ip-list').value = data.netlify_shecan.ips.join('\n');
			}

			function getInputs() {
				let hasError = false;
				const hostElement = document.getElementById('main-host');
				const sniElement = document.getElementById('domain-list');
				const ipElement = document.getElementById('ip-list');
				let rawHost = hostElement.value.trim();
				let cleanHost = rawHost.replace(/^(https?:\/\/)?(www\.)?/, '').split('/')[0];
				let host = cleanHost.replace(/[^a-zA-Z0-9.-]/g, '');
				const sniInput = sniElement.value.trim();
				const ipInput = ipElement.value.trim();
				if (!host) {
					showError(hostElement);
					hasError = true;
				}
				if (!sniInput) {
					showError(sniElement);
					hasError = true;
				}
				let ips = [];
				if (netlifyMode === 'shecan') {
					if (!ipInput) {
						showError(ipElement);
						hasError = true;
					} else {
						ips = ipInput.split('\n').map(i => i.trim().replace(/[^a-fA-F0-9.:]/g, '')).filter(i => i.length > 0);
					}
				}
				if (hasError) return null;
				const domains = sniInput.split('\n').map(d => d.trim().replace(/[^a-zA-Z0-9.-]/g, '')).filter(d => d.length > 0);
				let user = "Telegram-Parsashonam";
				let path = "/p4r34m";
				if (configMode === 'custom') {
					user = document.getElementById('custom-user').value.trim() || user;
					let p = document.getElementById('custom-path').value.trim();
					if (p) path = p.startsWith('/') ? p : '/' + p;
				}
				return {
					host,
					domains,
					ips,
					user,
					path
				};
			}

			function showError(element) {
				element.classList.add('error-border');
				element.addEventListener('input', function removeError() {
					element.classList.remove('error-border');
					element.removeEventListener('input', removeError);
				});
			}

			function generateConfigs() {
				const inputs = getInputs();
				if (!inputs) return;
				const {
					host,
					domains,
					ips,
					user,
					path
				} = inputs;
				let results = [];
				if (netlifyMode === 'shecan') {
					domains.forEach(sni => ips.forEach(ip => results.push(`vless://${user}@${ip}:443?encryption=none&security=tls&sni=${sni}&alpn=h2%2Chttp%2F1.1&insecure=1&allowInsecure=1&type=xhttp&host=${host}&path=${path}&mode=auto#🌐%20@IR_NETLIFY%20%20${sni}%20%20${ip}`)));
				} else {
					domains.forEach(d => results.push(data.netlify_normal.template.replaceAll("{USER}", user).replaceAll("{PATH}", path).replaceAll("{ADDRESS}", d).replaceAll("{SNI}", d).replaceAll("{HOST}", host).replaceAll("{NAME}", d)));
				}
				document.getElementById('result-area').value = results.join('\n');
				document.getElementById('balanced-output').style.display = 'none';
				document.getElementById('output-container').style.display = 'block';
			}

			function setJsonCore(core) {
				selectedCore = core;
				document.getElementById('sw-xray').classList.toggle('active', core === 'xray');
				document.getElementById('sw-singbox').classList.toggle('active', core === 'singbox');
				buildBalancedJson();
			}

			function generateBalancedJSON() {
				const inputs = getInputs();
				if (!inputs) return;
				document.getElementById('output-container').style.display = 'none';
				document.getElementById('balanced-output').style.display = 'block';
				buildBalancedJson();
			}

			function buildBalancedJson() {
				const {
					host,
					domains,
					ips,
					user,
					path
				} = getInputs();
				let proxies = [];
				if (netlifyMode === 'shecan') {
					domains.forEach((sni, sIdx) => {
						ips.forEach((ip, iIdx) => {
							proxies.push({
								name: `Node-${sIdx}-${iIdx}`,
								address: ip,
								sni: sni,
								host: host,
								path: path,
								user: user
							});
						});
					});
				} else {
					domains.forEach((d, idx) => {
						proxies.push({
							name: `Node-${idx}`,
							address: d,
							sni: d,
							host: host,
							path: path,
							user: user
						});
					});
				}
				if (selectedCore === 'xray') {
					lastGeneratedJson = createXrayJson(proxies);
				} else {
					lastGeneratedJson = createSingboxJson(proxies);
				}
			}

			function createXrayJson(proxies) {
				let outbounds = proxies.map(p => ({
					tag: p.name,
					protocol: "vless",
					settings: {
						vnext: [{
							address: p.address,
							port: 443,
							users: [{
								id: p.user,
								encryption: "none"
							}]
						}]
					},
					streamSettings: {
						network: "xhttp",
						security: "tls",
						tlsSettings: {
							serverName: p.sni,
							allowInsecure: true
						},
						xhttpSettings: {
							host: p.host,
							path: p.path
						}
					}
				}));
				const fullConfig = {
					inbounds: [{
						port: 10808,
						protocol: "socks",
						settings: {
							auth: "noauth",
							udp: true
						}
					}],
					outbounds: [...outbounds, {
						protocol: "freedom",
						tag: "direct"
					}],
					observatory: {
						subjectSelector: proxies.map(p => p.name),
						probeUrl: "http://cp.cloudflare.com/generate_204",
						probeInterval: "10s"
					},
					routing: {
						balancers: [{
							tag: "balancer",
							selector: proxies.map(p => p.name)
						}],
						rules: [{
							type: "field",
							network: "tcp,udp",
							balancerTag: "balancer"
						}]
					}
				};
				return JSON.stringify(fullConfig, null, 2);
			}

			function createSingboxJson(proxies) {
				let outbounds = proxies.map(p => ({
					type: "vless",
					tag: p.name,
					server: p.address,
					server_port: 443,
					uuid: p.user,
					tls: {
						enabled: true,
						server_name: p.sni,
						insecure: true
					},
					transport: {
						type: "xhttp",
						host: p.host,
						path: p.path
					}
				}));
				const fullConfig = {
					outbounds: [{
						type: "urltest",
						tag: "Autoscale-LoadBalancer",
						outbounds: proxies.map(p => p.name),
						url: "http://cp.cloudflare.com/generate_204",
						interval: "10s",
						tolerance: 50
					}, ...outbounds, {
						type: "direct",
						tag: "direct"
					}],
					route: {
						rules: [{
							outbound: "Autoscale-LoadBalancer"
						}]
					}
				};
				return JSON.stringify(fullConfig, null, 2);
			}
			async function copyBalanced() {
				if (!lastGeneratedJson) return;
				const copyBtn = document.getElementById('btn-copy-json');
				const originalText = copyBtn.innerText;
				const textToCopy = lastGeneratedJson;
				let copySuccess = false;
				try {
					if (navigator.clipboard && window.isSecureContext) {
						await navigator.clipboard.writeText(textToCopy);
						copySuccess = true;
					} else {
						throw new Error('Clipboard API Unavailable');
					}
				} catch (err) {
					const textArea = document.createElement("textarea");
					textArea.value = textToCopy;
					document.body.appendChild(textArea);
					textArea.select();
					copySuccess = document.execCommand('copy');
					document.body.removeChild(textArea);
				}
				if (copySuccess) {
					copyBtn.innerText = "COPIED ✓";
					copyBtn.style.color = "var(--neon-green)";
				} else {
					if (textToCopy.length > 800000) {
						alert("حجم بسیار بالا! لطفاً از دکمه DOWNLOAD استفاده کنید (محدودیت کلیپ‌بورد موبایل).");
					}
					copyBtn.innerText = "FAILED!";
					copyBtn.style.color = "var(--neon-red)";
				}
				setTimeout(() => {
					copyBtn.innerText = originalText;
					copyBtn.style.color = "";
				}, 2000);
			}

			function downloadBalanced() {
				if (!lastGeneratedJson) return;
				const blob = new Blob([lastGeneratedJson], {
					type: 'application/json'
				});
				const url = URL.createObjectURL(blob);
				const a = document.createElement('a');
				a.href = url;
				a.download = `IR_NETLIFY_Balanced_${getFormattedTimestamp()}.json`;
				document.body.appendChild(a);
				a.click();
				document.body.removeChild(a);
				URL.revokeObjectURL(url);
			}
			async function copyToClipboard(id, btnId) {
				const area = document.getElementById(id);
				const textToCopy = area.value;
				const btn = document.getElementById(btnId);
				if (!textToCopy) {
					alert("متنی برای کپی وجود ندارد!");
					return;
				}
				const blob = new Blob([textToCopy], {
					type: 'text/plain'
				});
				const url = URL.createObjectURL(blob);
				const a = document.createElement("a");
				a.href = url;
				a.download = `IR_NETLIFY_Configs_${getFormattedTimestamp()}.txt`;
				document.body.appendChild(a);
				a.click();
				setTimeout(() => {
					document.body.removeChild(a);
					window.URL.revokeObjectURL(url);
				}, 0);
				let copySuccess = false;
				try {
					if (navigator.clipboard && window.isSecureContext) {
						await navigator.clipboard.writeText(textToCopy);
						copySuccess = true;
					} else {
						throw new Error('API Unavailable');
					}
				} catch (err) {
					try {
						const tempTextArea = document.createElement("textarea");
						tempTextArea.value = textToCopy;
						tempTextArea.style.position = "fixed";
						tempTextArea.style.left = "-9999px";
						tempTextArea.style.top = "0";
						document.body.appendChild(tempTextArea);
						tempTextArea.focus();
						tempTextArea.select();
						copySuccess = document.execCommand('copy');
						document.body.removeChild(tempTextArea);
					} catch (fallbackErr) {
						copySuccess = false;
					}
				}
				if (copySuccess) {
					btn.innerText = "COPIED & DOWNLOADED ✓";
					btn.style.borderColor = "#00c40d";
					btn.style.color = "#00c40d";
				} else {
					if (textToCopy.length > 800000) {
						alert("حجم متن بسیار زیاد است. فایل با موفقیت دانلود شد، از آن استفاده کنید.");
					}
					btn.innerText = "DOWNLOADED ✓ (Copy Failed)";
					btn.style.borderColor = "var(--neon-orange)";
					btn.style.color = "var(--neon-orange)";
				}
				setTimeout(() => {
					btn.innerText = "Copy & Download";
					btn.style.borderColor = "#00c40d";
					btn.style.color = "#00c40d";
				}, 4000);
			}

			function getFormattedTimestamp() {
				const now = new Date();
				const year = now.getFullYear();
				const month = String(now.getMonth() + 1).padStart(2, '0');
				const day = String(now.getDate()).padStart(2, '0');
				const hours = String(now.getHours()).padStart(2, '0');
				const minutes = String(now.getMinutes()).padStart(2, '0');
				const seconds = String(now.getSeconds()).padStart(2, '0');
				return `${year}_${month}_${day}_${hours}-${minutes}-${seconds}`;
			}
