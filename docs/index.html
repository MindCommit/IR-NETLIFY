<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=480" />
		<title>IR NETLIFY CONFIG GENERATOR V9.5.9</title>
		<style>
			@font-face {
				font-family: "CustomFont";
				src: url("data") format("truetype");
				font-weight: normal;
				font-style: normal;
			}

			:root {
				--theme-netlify: #00e1ff;
				--neon-red: #ff0000;
				--neon-orange: #ff9100;
				--neon-green: #00c40d;
				--dark-bg: #0a0b10;
				--card-bg: #161b22;
				--text-color: #e6edf3;
				--scroll-thumb: #30363d;
				--current-theme: var(--theme-netlify);
			}

			::-webkit-scrollbar {
				width: 8px;
			}

			::-webkit-scrollbar-track {
				background: var(--dark-bg);
			}

			::-webkit-scrollbar-thumb {
				background: var(--scroll-thumb);
				border-radius: 10px;
				border: 2px solid var(--dark-bg);
			}

			::-webkit-scrollbar-thumb:hover {
				background: var(--current-theme);
			}

			body {
				font-family: "CustomFont", sans-serif;
				background-color: var(--dark-bg);
				color: var(--text-color);
				display: flex;
				justify-content: center;
				align-items: center;
				min-height: 100vh;
				margin: 0;
				flex-direction: column;
				padding: 20px;
				box-sizing: border-box;
			}

			body::before {
				content: "";
				position: absolute;
				width: 400px;
				height: 400px;
				background: var(--current-theme);
				filter: blur(180px);
				opacity: 0.05;
				z-index: -1;
				top: 5%;
				right: 5%;
				transition: background 0.4s ease;
			}

			.container {
				background-color: var(--card-bg);
				padding: 30px;
				border-radius: 20px;
				border: 1px solid var(--current-theme);
				box-shadow: 0 0px 50px rgba(0, 0, 0, 0.3);
				width: 95%;
				max-width: 420px;
				position: relative;
				box-sizing: border-box;
				filter: brightness(1.1) contrast(1.12);
			}

			h2 {
				color: var(--current-theme);
				text-align: center;
				text-transform: uppercase;
				margin-bottom: 10px;
				font-size: 1rem;
				transition: color 0.4s ease;
			}

			.tabs,
			#netlify-options,
			#netlify-config-type {
				display: flex;
				flex-direction: row-reverse;
				gap: 10px;
				margin-bottom: 20px;
				padding-bottom: 15px;
			}

			.tabs {
				border-bottom: 1px solid #30363d;
			}

			#netlify-options,
			#netlify-config-type {
				display: none;
				flex-direction: row-reverse;
				gap: 10px;
				margin-bottom: 5px;
				animation: fadeIn 0.3s ease;
			}

			#custom-settings {
				display: none;
				border: 1px solid var(--neon-orange);
				padding: 15px;
				border-radius: 12px;
				margin-bottom: 15px;
				background: rgba(255, 145, 0, 0.02);
			}

			@keyframes fadeIn {
				from {
					opacity: 0;
					transform: translateY(-5px);
				}

				to {
					opacity: 1;
					transform: translateY(0);
				}
			}

			.tab-btn,
			.sub-tab-btn {
				position: relative;
				flex: 1;
				padding: 10px;
				background: rgba(255, 255, 255, 0.03);
				border: 1px solid #30363d;
				color: #8b949e;
				border-radius: 10px;
				cursor: pointer;
				font-weight: bold;
				transition: all 0.3s;
				text-transform: uppercase;
				font-size: 0.7rem;
			}

			.tab-btn:hover,
			.sub-tab-btn:hover {
				background: rgba(255, 255, 255, 0.05);
				color: var(--text-color);
			}

			#tab-netlify.active {
				border-color: var(--theme-netlify);
				color: var(--theme-netlify);
				background: rgba(0, 207, 255, 0.15);
				box-shadow: 0 0 10px rgba(0, 207, 255, 0.5);
			}

			#btn-shecan.active {
				border-color: var(--theme-netlify);
				color: var(--theme-netlify);
				background: rgba(0, 207, 255, 0.15);
				box-shadow: 0 0 7px rgba(0, 207, 255, 0.3);
			}

			#btn-normal.active {
				border-color: var(--theme-netlify);
				color: var(--theme-netlify);
				background: rgba(0, 207, 255, 0.15);
				box-shadow: 0 0 7px rgba(0, 207, 255, 0.3);
			}

			#btn-custom.active {
				border-color: var(--neon-orange);
				color: var(--neon-orange);
				background: rgba(255, 170, 0, 0.13);
				box-shadow: 0 0 7px rgba(225, 117, 0, 0.3);
			}

			#btn-default.active {
				border-color: var(--theme-netlify);
				color: var(--theme-netlify);
				background: rgba(0, 207, 255, 0.1);
				box-shadow: 0 0 7px rgba(0, 207, 255, 0.3);
			}

			.sub-tab-btn.active-version {
				border-color: #ffd700 !important;
				color: #ffd700 !important;
				box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
				background: rgba(255, 215, 0, 0.1) !important;
			}

			select.styled-select {
				width: 100%;
				padding: 12px;
				background: #0d1117;
				border: 1px solid #30363d;
				border-radius: 10px;
				color: white;
				font-family: "Consolas", monospace;
				font-size: 0.8rem;
				outline: none;
				appearance: none;
				cursor: pointer;
				transition: all 0.3s;
			}

			select.styled-select:focus {
				border-color: var(--theme-netlify);
				box-shadow: 0 0 8px rgba(0, 225, 255, 0.1);
			}

			select.styled-select option {
				background: #0d1117;
				color: white;
			}

			.input-group {
				margin-bottom: 15px;
			}

			label {
				font-size: 0.7rem;
				color: var(--current-theme);
				font-weight: bold;
				text-transform: uppercase;
				display: block;
				margin-bottom: 8px;
				transition: color 0.4s ease;
			}

			.tutorial-link {
				color: var(--neon-green);
				text-decoration: none;
				font-size: 0.6rem;
				border: 2px solid rgba(0, 80, 40, 0.9);
				padding: 2px 8px;
				border-radius: 8px;
				transition: 0.3s;
				display: none;
			}

			.tutorial-link:hover {
				background: rgba(0, 255, 40, 0.1);
			}

			input[type="text"],
			textarea {
				width: 100%;
				padding: 12px;
				background: #0d1117;
				border: 1px solid #30363d;
				border-radius: 10px;
				color: white;
				box-sizing: border-box;
				font-family: "Consolas", monospace;
				font-size: 0.8rem;
				transition: all 0.3s;
				resize: vertical;
			}

			input:focus,
			textarea:focus {
				outline: none;
				border-color: var(--current-theme);
				box-shadow: 0 0 8px rgba(255, 255, 255, 0.05);
			}

			.action-btn {
				background: transparent;
				padding: 4px 10px;
				border-radius: 6px;
				cursor: pointer;
				font-size: 0.65rem;
				font-weight: bold;
				text-transform: uppercase;
				transition: 0.3s;
			}

			.btn-default-action {
				color: var(--neon-orange);
				border: 1px solid var(--neon-orange);
			}

			.btn-clear {
				color: var(--neon-red);
				border: 1px solid var(--neon-red);
			}

			.btn-copy {
				color: #00c40d;
				border: 1px solid #00c40d;
				margin-top: 0 !important;
			}

			.gen-btn {
				position: relative;
				background: transparent;
				color: var(--neon-green);
				border: 2px solid var(--neon-green);
				padding: 12px;
				border-radius: 12px;
				cursor: pointer;
				width: 100%;
				font-weight: bold;
				margin-top: 10px;
				text-transform: uppercase;
				transition: all 0.3s ease;
			}

			.gen-btn:hover {
				background-color: var(--neon-green);
				color: #000;
			}

			@keyframes slideUp {
				from {
					opacity: 0;
					transform: translateY(10px);
				}

				to {
					opacity: 1;
					transform: translateY(0);
				}
			}

			.success-header {
				margin-top: 15px;
				margin-bottom: 15px;
				display: flex;
				justify-content: space-between;
				align-items: center;
			}
			.success-header span {
				line-height: 1;
				display: inline-block;
			}
			#result-area {
				border-color: #00c40d;
				color: #00c40d;
				min-height: 150px;
			}

			.footer {
				margin-top: 25px;
			}

			.footer-link {
				color: var(--current-theme);
				text-decoration: none;
				font-size: 0.8rem;
				border: 2px solid var(--current-theme);
				padding: 7px 18px;
				border-radius: 50px;
				transition: 0.3s;
			}

			.footer-link:hover {
				color: var(--neon-green);
				border-color: var(--neon-green);
			}

			textarea::-webkit-resizer {
				background-color: var(--dark-bg);
				border: 1px solid var(--card-bg);
				outline: 1px solid var(--dark-bg);
				box-shadow: 0 0 2px var(--dark-bg);
			}

			.error-border {
				border: 3px solid var(--neon-red) !important;
				box-shadow: 0 0 10px rgba(255, 0, 0, 0.9) !important;
				animation: shake 0.3s ease-in-out;
			}

			@keyframes shake {
				0% {
					transform: translateX(0);
				}

				25% {
					transform: translateX(-5px);
				}

				50% {
					transform: translateX(5px);
				}

				75% {
					transform: translateX(-5px);
				}

				100% {
					transform: translateX(0);
				}
			}

			.btn-paste {
				color: var(--theme-netlify);
				border: 1px solid var(--theme-netlify);
			}

			.btn-default-action:hover {
				background: rgba(255, 145, 0, 0.15);
				box-shadow: 0 0 8px rgba(255, 145, 0, 0.4);
			}

			.btn-clear:hover {
				background: rgba(255, 68, 68, 0.15);
				box-shadow: 0 0 8px rgba(255, 68, 68, 0.4);
			}

			.btn-paste:hover {
				background: rgba(0, 207, 255, 0.15);
				box-shadow: 0 0 8px rgba(0, 207, 255, 0.4);
			}

			.action-btn:active {
				transform: scale(0.92);
			}

			.info-icon {
				position: absolute;
				right: 8px;
				top: 50%;
				transform: translateY(-50%);
				display: inline-flex;
				justify-content: center;
				align-items: center;
				width: 10px;
				height: 10px;
				border-radius: 30%;
				background: rgba(255, 255, 255, 0.05);
				color: var(--neon-green);
				font-size: 7px;
				cursor: pointer;
				transition: all 0.3s ease;
				border: 1px solid var(--neon-green);
			}

			.info-icon:hover {
				background: var(--neon-green);
				color: #000;
				border-color: var(--neon-green);
				box-shadow: 0 0 20px var(--neon-green);
			}

			.info-modal-overlay {
				display: none;
				position: fixed;
				top: 0;
				left: 0;
				width: 100vw;
				height: 100vh;
				background: rgba(10, 11, 16, 0.9);
				backdrop-filter: blur(8px);
				z-index: 9999;
				justify-content: center;
				align-items: center;
				opacity: 0;
			}

			.info-modal-overlay.active {
				display: flex;
				animation: fadeInModal 0.3s forwards;
			}

			@keyframes fadeInModal {
				from {
					opacity: 0;
					transform: scale(0.95);
				}

				to {
					opacity: 1;
					transform: scale(1);
				}
			}

			.info-modal-content {
				background-color: var(--card-bg);
				border: 2px solid var(--theme-netlify);
				border-radius: 20px;
				padding: 25px;
				width: calc(100% - 20px);
				max-width: 400px;
				margin: 10px;
				box-shadow:
					0 10px 30px rgba(0, 0, 0, 0.8),
					0 0 15px rgba(0, 207, 255, 0.1);
				position: relative;
				direction: rtl;
				text-align: right;
				line-height: 1.8;
				font-size: 0.85rem;
				max-height: 85vh;
				overflow-y: auto;
			}

			.info-modal-content h3 {
				color: var(--theme-netlify);
				margin-top: 0;
				border-bottom: 2px solid #00e1ff;
				padding-bottom: 10px;
				direction: ltr;
				text-align: left;
			}

			.info-modal-close {
				position: absolute;
				top: 15px;
				right: 15px;
				background: transparent;
				border: none;
				color: var(--neon-red);
				font-size: 1.5rem;
				cursor: pointer;
				transition: 0.3s;
			}

			.info-modal-close:hover {
				text-shadow: 0 0 8px var(--neon-red);
			}

			.warning-text {
				color: var(--neon-orange);
				font-weight: bold;
			}

			.input-with-button {
				display: flex;
				gap: 10px;
				align-items: center;
			}

			#main-host {
				flex-grow: 1;
			}

			.check-btn {
				width: 38px;
				height: 38px;
				background: transparent;
				border: 2px solid var(--current-theme);
				border-radius: 10px;
				color: var(--current-theme);
				cursor: pointer;
				display: flex;
				justify-content: center;
				align-items: center;
				transition: all 0.3s;
				font-size: 1.2rem;
			}

			.check-btn:hover {
				background: rgba(0, 225, 255, 0.1);
				box-shadow: 0 0 10px var(--current-theme);
			}

			.check-btn:disabled {
				opacity: 0.5;
				cursor: not-allowed;
			}

			.spinning {
				animation: rotate 1s linear infinite;
			}

			@keyframes rotate {
				from {
					transform: rotate(0deg);
				}
				to {
					transform: rotate(360deg);
				}
			}

			#server-checkboxes label {
				background: rgba(255, 255, 255, 0.05);
				padding: 5px;
				border-radius: 6px;
				transition: 0s;
			}

			#server-checkboxes label:has(input:checked) {
				background: rgba(0, 196, 13, 0.3);
				box-shadow: inset 0 0 0 2px var(--neon-green);
				border: none;
			}

			#server-checkboxes input[type="checkbox"] {
				accent-color: var(--neon-green);
				cursor: pointer;
				width: 16px;
				height: 16px;
			}
			.animated-bg {
				position: fixed;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				z-index: -1;
				background-color: #001a1a;
				background-image: radial-gradient(at 10% 20%, hsla(180, 100%, 12%, 1) 12px, transparent 50%), radial-gradient(at 90% 10%, hsla(170, 80%, 15%, 1) 12px, transparent 50%), radial-gradient(at 50% 50%, hsla(185, 90%, 10%, 1) 12px, transparent 50%), radial-gradient(at 20% 80%, hsla(190, 100%, 12%, 1) 12px, transparent 50%), radial-gradient(at 80% 90%, hsla(175, 70%, 15%, 1) 12px, transparent 50%);
				background-size: 100% 100%;
				animation: randomMovement 8s infinite alternate-reverse;
				filter: blur(0px);
				filter: blur(0px) brightness(1.1) contrast(1.12);
			}

			@keyframes randomMovement {
				0% {
					background-position: 0% 0%;
					background-size: 150% 150%;
				}
				33% {
					background-position: 50% 100%;
					background-size: 180% 120%;
				}
				66% {
					background-position: 100% 20%;
					background-size: 130% 170%;
				}
				100% {
					background-position: 20% 50%;
					background-size: 150% 150%;
				}
			}

			#server-checkboxes label img {
				display: inline-block;
				max-width: 20px;
				max-height: 20px;
				object-fit: contain;
				margin-right: 1px;
			}

			#server-checkboxes label {
				min-height: 20px;
			}

			#server-checkboxes img {
				width: 16px;
				height: 16px;
				flex-shrink: 0;
			}
		</style>
	</head>
	<body>
		<div class="animated-bg"></div>
		<div class="container">
			<h2>
				IR NETLIFY <br />
				CONFIG GENERATOR V9.5.9
			</h2>
			<div class="tabs">
				<button class="tab-btn active" id="tab-netlify">
					Netlify
					<span class="info-icon" onclick="showInfo(event, 'netlify')">?</span>
				</button>
			</div>

			<div class="tabs" style="border-bottom: none; margin-bottom: 8px; gap: 10px">
				<button class="sub-tab-btn active-version" id="ver-103" onclick="setAppVersion('1.0.3')">V 1.0.3</button>
				<button class="sub-tab-btn" id="ver-102" onclick="setAppVersion('1.0.2')">V 1.0.2</button>
			</div>

			<div id="netlify-options">
				<button class="sub-tab-btn" id="btn-shecan" onclick="setNetlifyMode('shecan')">
					IP + SNI
					<span class="info-icon" onclick="showInfo(event, 'ip_sni')">?</span>
				</button>
				<button class="sub-tab-btn" id="btn-normal" onclick="setNetlifyMode('normal')">
					Direct SNI
					<span class="info-icon" onclick="showInfo(event, 'direct_sni')">?</span>
				</button>
			</div>
			<div id="netlify-config-type">
				<button class="sub-tab-btn" id="btn-custom" onclick="setConfigMode('custom')">
					Custom Server
					<span class="info-icon" onclick="showInfo(event, 'custom')">?</span>
				</button>
				<button class="sub-tab-btn" id="btn-default" onclick="setConfigMode('default')">
					Default Server
					<span class="info-icon" onclick="showInfo(event, 'parsa')">?</span>
				</button>
			</div>
			<div id="custom-settings">
				<div class="input-group">
					<label style="color: var(--neon-orange)">Server Name</label>
					<input id="custom-name" placeholder="Server Name" type="text" />
				</div>
				<div class="input-group">
					<label style="color: var(--neon-orange)">Server Address</label>
					<input id="custom-address" placeholder="https://sub.domain.com:444" type="text" />
				</div>
				<div class="input-group">
					<label style="color: var(--neon-orange)">Custom User (UUID)</label>
					<input id="custom-user" placeholder="your-uuid-here" type="text" />
				</div>
				<div class="input-group">
					<label style="color: var(--neon-orange)">Custom Path</label>
					<input id="custom-path" placeholder="/aaaaa" type="text" />
				</div>
			</div>

			<div id="default-settings" style="display: none; border: 2px solid var(--theme-netlify); padding: 10px; border-radius: 9px; margin-bottom: 15px; background: rgba(0, 225, 255, 0.02)">
				<div class="input-group">
					<label style="color: var(--theme-netlify)">Select Server</label>
					<div id="server-checkboxes" style="display: grid; grid-template-columns: repeat(3, 1fr); row-gap: 0px; column-gap: 5px; background: #0d1117; padding: 8px; border-radius: 6px; border: 2px solid #30363d; width: 100%; box-sizing: border-box; justify-content: center">
						<label style="display: flex; align-items: center; gap: 1px; color: white; font-size: 0.5rem; cursor: pointer; background: #161b22; padding: 5px; border-radius: 6px">
							<input type="checkbox" name="server-choice" value="server1" />
							<img src="https://hatscripts.github.io/circle-flags/flags/de.svg" width="14" height="14" onerror="this.remove()" /> Parsa
						</label>
						<label style="display: flex; align-items: center; gap: 1px; color: white; font-size: 0.5rem; cursor: pointer; background: #161b22; padding: 5px; border-radius: 6px">
							<input type="checkbox" name="server-choice" value="server2" />
							<img src="https://hatscripts.github.io/circle-flags/flags/nl.svg" width="14" height="14" onerror="this.remove()" /> Xarheon
						</label>
						<label style="display: flex; align-items: center; gap: 1px; color: white; font-size: 0.5rem; cursor: pointer; background: #161b22; padding: 5px; border-radius: 6px">
							<input type="checkbox" name="server-choice" value="server3" />
							<img src="https://hatscripts.github.io/circle-flags/flags/se.svg" width="14" height="14" onerror="this.remove()" /> BEHNAM
						</label>
						<label style="display: flex; align-items: center; gap: 1px; color: white; font-size: 0.5rem; cursor: pointer; background: #161b22; padding: 5px; border-radius: 6px">
							<input type="checkbox" name="server-choice" value="server4" />
							<img src="https://hatscripts.github.io/circle-flags/flags/fi.svg" width="14" height="14" onerror="this.remove()" /> Saman 1
						</label>
						<label style="display: flex; align-items: center; gap: 1px; color: white; font-size: 0.5rem; cursor: pointer; background: #161b22; padding: 5px; border-radius: 6px">
							<input type="checkbox" name="server-choice" value="server5" />
							<img src="https://hatscripts.github.io/circle-flags/flags/nl.svg" width="14" height="14" onerror="this.remove()" /> Alwinbalot
						</label>

						} else {

								const srv = predefinedServers[cb.value];
								if (srv) {
									selectedServers.push(srv);
								}
							});
						}
					}
				}

				if (hasError) return null;

				return {
					host,
					domains,
					ips,
					selectedServers,
				};
			}

			function showError(element) {
				element.classList.add("error-border");
				element.addEventListener("input", function removeError() {
					element.classList.remove("error-border");
					element.removeEventListener("input", removeError);
				});
			}

			function generateConfigs() {
				const inputs = getInputs();
				if (!inputs) return;

				const { host, domains, ips, selectedServers } = inputs;
				let results = [];

				selectedServers.forEach((srv) => {
					const { user, path, address: serverAddress, name: serverName } = srv;

					let extraData;

					if (serverName === "parsashonam") {
						extraData = {
							headers: { "x-host": serverAddress }, 
							xPaddingBytes: "10-50",
							xPaddingObfsMode: true,
							xPaddingKey: "Parsashonam",
							xPaddingHeader: "Parsashonam",
							scMaxEachPostBytes: 1000000
						};
					} else {
						extraData = {
							xPaddingBytes: "1-1",
							xPaddingObfsMode: true,
							scMaxEachPostBytes: "1000000",
							xPaddingKey: "iran",
							xPaddingHeader: "iran"
						};

						if (appVersion === "1.0.3") {
							extraData.headers = { "x-host": serverAddress };
						}
					}

					const encodedExtra = encodeURIComponent(JSON.stringify(extraData));
					const encodedPath = encodeURIComponent(path);

					if (netlifyMode === "shecan") {
						domains.forEach((sni) => {
							ips.forEach((ip) => {
								const remark = encodeURIComponent(`🌐 @IR_NETLIFY | ${sni} | ${ip} | ${serverName}`);
								results.push(`vless://${user}@${ip}:443?encryption=none&security=tls&sni=${sni}&fp=chrome&alpn=h2%2Chttp%2F1.1&insecure=1&allowInsecure=1&type=xhttp&host=${host}&path=${encodedPath}&mode=auto&extra=${encodedExtra}#${remark}`);
							});
						});
					} else {
						domains.forEach((sni) => {
							const remark = encodeURIComponent(`🌐 @IR_NETLIFY | ${sni} | ${serverName}`);
							results.push(`vless://${user}@${sni}:443?encryption=none&security=tls&sni=${sni}&fp=chrome&alpn=h2%2Chttp%2F1.1&insecure=1&allowInsecure=1&type=xhttp&host=${host}&path=${encodedPath}&mode=auto&extra=${encodedExtra}#${remark}`);
						});
					}
				});

				document.getElementById("result-area").value = results.join("\n");
				document.getElementById("output-container").style.display = "block";
				document.getElementById("config-count").innerText = `${results.length} CONFIGS GENERATED ✓`;
			}

			async function copyToClipboard(id, btnId) {
				const area = document.getElementById(id);
				const textToCopy = area.value;
				const btn = document.getElementById(btnId);
				if (!textToCopy) {
					alert("متنی برای کپی وجود ندارد!");
					return;
				}
				const blob = new Blob([textToCopy], {
					type: "text/plain",
				});
				const url = URL.createObjectURL(blob);
				const a = document.createElement("a");
				a.href = url;
				a.download = `IR_NETLIFY_Configs_${getFormattedTimestamp()}.txt`;
				document.body.appendChild(a);
				a.click();
				setTimeout(() => {
					document.body.removeChild(a);
					window.URL.revokeObjectURL(url);
				}, 0);
				let copySuccess = false;
				try {
					if (navigator.clipboard && window.isSecureContext) {
						await navigator.clipboard.writeText(textToCopy);
						copySuccess = true;
					} else {
						throw new Error("API Unavailable");
					}
				} catch (err) {
					try {
						const tempTextArea = document.createElement("textarea");
						tempTextArea.value = textToCopy;
						tempTextArea.style.position = "fixed";
						tempTextArea.style.left = "-9999px";
						tempTextArea.style.top = "0";
						document.body.appendChild(tempTextArea);
						tempTextArea.focus();
						tempTextArea.select();
						copySuccess = document.execCommand("copy");
						document.body.removeChild(tempTextArea);
					} catch (fallbackErr) {
						copySuccess = false;
					}
				}
				if (copySuccess) {
					btn.innerText = "COPIED & DOWNLOADED ✓";
					btn.style.borderColor = "#00c40d";
					btn.style.color = "#00c40d";
				} else {
					if (textToCopy.length > 8000000) {
						alert("حجم متن بسیار زیاد است. فایل با موفقیت دانلود شد، از آن استفاده کنید.");
					}
					btn.innerText = "DOWNLOADED ✓ (Copy Failed)";
					btn.style.borderColor = "var(--neon-orange)";
					btn.style.color = "var(--neon-orange)";
				}
				setTimeout(() => {
					btn.innerText = "Copy & Download";
					btn.style.borderColor = "#00c40d";
					btn.style.color = "#00c40d";
				}, 4000);
			}

			window.onload = () => {
				setPlatform();
				setNetlifyMode("shecan");

			};

			async function pasteToArea(targetId) {
				const area = document.getElementById(targetId);

					if (text) {

					}
				} catch (err) {
					alert("Paste failed. Please Paste Manually.");
					console.error("Failed to read clipboard: ", err);
				}
			}

			function getFormattedTimestamp() {
				const now = new Date();
				const year = now.getFullYear();
				const month = String(now.getMonth() + 1).padStart(2, "0");
				const day = String(now.getDate()).padStart(2, "0");
				const hours = String(now.getHours()).padStart(2, "0");
				const minutes = String(now.getMinutes()).padStart(2, "0");
				const seconds = String(now.getSeconds()).padStart(2, "0");
				return `${year}_${month}_${day}_${hours}-${minutes}-${seconds}`;
			}

			async function checkSingleDomain() {
				const hostElement = document.getElementById("main-host");
				const checkBtn = document.getElementById("check-domain-btn");
				const domain = hostElement.value.trim();

				const SERVER_URL = "https://ir-netlify-checker.ir-netlify.workers.dev/";

				if (!domain) {
					showError(hostElement);
					return;
				}

				checkBtn.disabled = true;
				checkBtn.innerHTML = "⏳";
				checkBtn.classList.add("spinning");

				try {
					const response = await fetch(`${SERVER_URL}?domain=${domain}`);
					const data = await response.json();

					if (data.status === "Healthy") {
						alert("🟢 دامنه نتلیفای شما سالم است 🟢");
						hostElement.style.borderColor = "var(--neon-green)";
					} else {
						alert("🔴 دامنه نتلیفای شما خراب است 🔴");
						hostElement.style.borderColor = "var(--neon-red)";
					}
				} catch (error) {
					alert("🟠 بررسی دامنه انجام نشد اتصال فیلترشکن خود را بررسی کنید 🟠");
					console.error("Connection Error:", error);
				} finally {
					checkBtn.disabled = false;
					checkBtn.innerHTML = "⚡";
					checkBtn.classList.remove("spinning");
				}
			}
